name: Bug Report
description: Report a bug or unexpected behavior in a Legends GitHub skill
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting. Please fill in the details below so we can reproduce and fix the issue."
  - type: dropdown
    id: skill
    attributes:
      label: Which skill?
      description: Which skill or command triggered the bug?
      options:
        - /github audit
        - /github readme
        - /github legal
        - /github meta
        - /github seo
        - /github community
        - /github release
        - /github empire
        - /github (orchestrator)
        - Installer (install.sh / install.ps1)
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen instead?
      placeholder: Describe the bug...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      value: |
        1. Run `/github ...` on repo `owner/repo`
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: error-output
    attributes:
      label: Error Output
      description: Paste any error messages or unexpected output here.
      render: shell
  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code Version
      placeholder: "e.g., 1.0.26"
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
  - type: dropdown
    id: dataforseo
    attributes:
      label: DataForSEO Configured?
      description: Is the DataForSEO MCP server set up?
      options:
        - "Yes"
        - "No"
        - "Not sure"
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else that might help (screenshots, cache files, etc.)
